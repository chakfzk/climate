// --- 상호작용 화살표 컴포넌트 ---
const ArrowPath = ({ id, d, value, color, angle, headPos, textPos, label, hoveredId, setHoveredId, noArrow, noText, hideText, hideArrow }) => {
  const isHovered = hoveredId === id;
  const baseW = Math.max(value * 0.45, 3);
  const w = isHovered ? baseW * 1.2 + 2 : baseW; 
  
  let p1, p2, p3;
  if (!noArrow && !hideArrow) {
    const rad = angle * Math.PI / 180;
    const hw = w * 1.2 + 8;
    const hl_front = w * 0.8 + 5;
    const hl_back = w * 1.0 + 8;
    const tipX = headPos.x + hl_front * Math.cos(rad);
    const tipY = headPos.y + hl_front * Math.sin(rad);
    p1 = `${tipX},${tipY}`;
    const baseX = headPos.x - hl_back * Math.cos(rad);
    const baseY = headPos.y - hl_back * Math.sin(rad);
    p2 = `${baseX + hw * Math.sin(rad)},${baseY - hw * Math.cos(rad)}`;
    p3 = `${baseX - hw * Math.sin(rad)},${baseY + hw * Math.cos(rad)}`;
  }

  const boxWidth = label ? 80 : 48;
  const boxHeight = label ? 38 : 26;

  return (
    <g className="cursor-pointer" onMouseEnter={() => setHoveredId(id)} onMouseLeave={() => setHoveredId(null)}>
      {!hideArrow && (
        <>
          <path d={d} stroke="transparent" strokeWidth={w + 50} fill="none" strokeLinecap="butt" />
          <path d={d} stroke="#fde047" strokeWidth={w + 14} fill="none" strokeLinecap="butt" strokeLinejoin="round" opacity={isHovered ? 0.9 : 0} className="transition-all duration-300" />
          <path d={d} stroke={color} strokeWidth={w} fill="none" strokeLinecap="butt" strokeLinejoin="round" className="transition-all duration-300 shadow-lg" />
          {!noArrow && (
            <>
              <polygon points={`${p1} ${p2} ${p3}`} fill="none" stroke="#fde047" strokeWidth="14" strokeLinejoin="round" opacity={isHovered ? 0.9 : 0} className="transition-all duration-300" />
              <polygon points={`${p1} ${p2} ${p3}`} fill={color} strokeLinejoin="round" className="transition-all duration-300" />
            </>
          )}
        </>
      )}
      
      {!hideText && !noText && textPos && (
        <g className="transition-all duration-300" style={{ transform: isHovered ? 'scale(1.15)' : 'scale(1)', transformOrigin: `${textPos.x}px ${textPos.y}px` }}>
          <rect x={textPos.x - boxWidth / 2} y={label ? textPos.y - 19 : textPos.y - 13} width={boxWidth} height={boxHeight} fill={isHovered ? "#fef9c3" : "rgba(255,255,255,0.95)"} stroke={isHovered ? "#f59e0b" : "transparent"} strokeWidth="2.5" rx="8" className="shadow-md" />
          <text x={textPos.x} y={textPos.y} textAnchor="middle" dominantBaseline="middle" className={`font-black transition-colors duration-300 ${isHovered ? 'fill-red-700' : 'fill-slate-800'}`}>
            {label && <tspan x={textPos.x} dy="-0.6em" fontSize="11">{label}</tspan>}
            <tspan x={textPos.x} dy={label ? "1.2em" : "0"} fontSize="14">{value.toFixed(1)}</tspan>
          </text>
        </g>
      )}
    </g>
  );
};

function App() {
  const [showStartModal, setShowStartModal] = useState(true);

  // === 시뮬레이션 상태 변수 ===
  const CURRENT_YEAR = 2026;
  const CURRENT_CO2_BASE = 63.6; // 420ppm에 해당하는 스케일 기준점

  const [targetCo2, setTargetCo2] = useState(CURRENT_CO2_BASE); 
  const [currentCo2, setCurrentCo2] = useState(CURRENT_CO2_BASE);
  const [year, setYear] = useState(CURRENT_YEAR);
  const [isPlaying, setIsPlaying] = useState(false);
  const [hoveredId, setHoveredId] = useState(null);

  // 핵심: 순배출량 (Net Emission) 상태 (-5 부터 +5 까지)
  const [netEmission, setNetEmission] = useState(2); 

  // 내부 상태 추적기 (requestAnimationFrame을 위해 동기화)
  const stateRef = useRef({ 
    target: CURRENT_CO2_BASE, 
    current: CURRENT_CO2_BASE, 
    playing: false, 
    netEmission: 2, 
    year: CURRENT_YEAR,
    lastRecordedYear: CURRENT_YEAR,
    simHistory: [] // 시뮬레이션 진행 기록 저장
  });

  useEffect(() => { 
    stateRef.current.playing = isPlaying; 
    stateRef.current.netEmission = netEmission;
  }, [isPlaying, netEmission]);

  // === 애니메이션 루프 (시간과 농도 독립적 동기화) ===
  useEffect(() => {
    let frameId;
    let lastTime = 0;
    const loop = (time) => {
      if (!lastTime) lastTime = time;
      const dt = time - lastTime;
      lastTime = time;
      
      let { target, current, playing, netEmission: netRate, year: curYear, lastRecordedYear } = stateRef.current;

      if (playing) {
        // 실제 시간(dt)에 비례하여 시뮬레이션 연도를 일정하게 증가
        const yearDelta = dt / 666; 
        curYear += yearDelta;

        // 순배출량(NET)에 따라 이산화탄소 증가/감소폭 계산
        const dS_dYear = netRate * 0.25; 
        target += dS_dYear * yearDelta;

        // 범위 제한 (0 ~ 200으로 확장하여 500ppm에서 멈추지 않도록 함)
        if (target < 0) target = 0;
        if (target >= 200) { 
          target = 200; 
          setIsPlaying(false); 
          stateRef.current.playing = false;
        }

        // 시뮬레이션 기록 저장 (그래프 용, 1년 단위)
        if (curYear - lastRecordedYear >= 1) {
          stateRef.current.simHistory.push({
            year: Math.floor(curYear),
            S: target
          });
          stateRef.current.lastRecordedYear = Math.floor(curYear);
        }

        // 수치 갱신
        stateRef.current.target = target;
        stateRef.current.year = curYear;
        setTargetCo2(target);
        setYear(Math.floor(curYear));
      }

      // 화살표 굵기 스무딩 효과
      const diff = target - current;
      if (Math.abs(diff) > 0.01) {
        current += diff * 0.08; 
        stateRef.current.current = current;
        setCurrentCo2(current);
      }

      frameId = requestAnimationFrame(loop);
    };
    frameId = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(frameId);
  }, []);

  const handleStartOptimization = () => {
    setShowStartModal(false);
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(() => {});
    }
  };

  // 초기화(리셋) 함수
  const handleReset = () => {
    setTargetCo2(CURRENT_CO2_BASE);
    setCurrentCo2(CURRENT_CO2_BASE);
    setYear(CURRENT_YEAR);
    setIsPlaying(false);
    setNetEmission(2);
    
    stateRef.current.target = CURRENT_CO2_BASE;
    stateRef.current.current = CURRENT_CO2_BASE;
    stateRef.current.year = CURRENT_YEAR;
    stateRef.current.playing = false;
    stateRef.current.netEmission = 2;
    stateRef.current.lastRecordedYear = CURRENT_YEAR;
    stateRef.current.simHistory = [];
  };

  // === 물리 모델 (온도 및 화살표 에너지) ===
  const S = currentCo2;
  const ppm = 280 + S * 2.2;
  const tempAnomaly = S * 0.01887; 
  const tempC = 13.8 + tempAnomaly;

  // 선택한 정책(순배출량)에 따른 1.5°C 도달 예상 연도 동적 계산
  const getEstimatedYear = () => {
    const remaining = 79.5 - targetCo2;
    if (remaining <= 0) return "이미 돌파함";
    if (netEmission <= 0) return "도달 안 함 (안정화)";
    
    const rate = netEmission * 0.25;
    const yearsLeft = remaining / rate;
    return Math.floor(year + yearsLeft) + "년";
  };

  // 에너지 밸런스 방정식
  const solar = 100.0;
  const reflectTotal = 30.0;
  const solarAtmo = 20.0; 
  const solarSurf = 50.0; 
  // S가 너무 커져서 D가 음수가 되는 물리적 오류 방지
  const D = Math.max(0, 5.2 - (S * 0.04)); 
  const U = 70.0 - D; 
  const B = 70.0 + (S * 0.7); 
  // 기존 46.0에서 50.0으로 수정 (대류/증발 등의 비복사 에너지를 복사 에너지에 통합하여 시각적 직관성 확보)
  const R = 50.0 + B; 
  const A_abs = R - D; 

  // 색상 값 음수 방지
  const hue = Math.max(0, 110 - (S * 0.7));
  const groundColor = `hsl(${hue}, 65%, 55%)`; 

  // === 차트 데이터 생성 (과거 + 시뮬레이션 기록 + 미래 예측) ===
  const chartData = useMemo(() => {
    const data = [];
    // 1. 과거 데이터 (1850 ~ 2026) : 산업화 이전부터 시작
    for (let y = 1850; y <= 2026; y += 2) {
      const progress = (y - 1850) / (2026 - 1850);
      // 산업화 초기에는 완만하다가 최근 급격해진 곡선 반영
      const histS = 63.6 * Math.pow(progress, 3);
      data.push({ year: y, ppmHistory: 280 + histS * 2.2, tempHistory: histS * 0.01887 });
    }

    // 2. 시뮬레이션 진행 데이터 (2026 ~ 현재 연도)
    const simHist = stateRef.current.simHistory;
    simHist.forEach(pt => {
      data.push({ year: pt.year, ppmHistory: 280 + pt.S * 2.2, tempHistory: pt.S * 0.01887 });
    });

    // 3. 미래 예측 데이터 (현재 연도 ~ 2100)
    if (data.length > 0) {
      const lastHist = data[data.length - 1];
      // 연결점
      lastHist.ppmProj = lastHist.ppmHistory;
      lastHist.tempProj = lastHist.tempHistory;

      const rate = netEmission * 0.25;
      let currentProjS = simHist.length > 0 ? simHist[simHist.length - 1].S : 63.6;
      
      for (let y = lastHist.year + 2; y <= 2100; y += 2) {
        currentProjS += rate * 2;
        if (currentProjS < 0) currentProjS = 0;
        if (currentProjS > 200) currentProjS = 200; // 상한선 200으로 확장
        data.push({ year: y, ppmProj: 280 + currentProjS * 2.2, tempProj: currentProjS * 0.01887 });
      }
    }
    return data;
  }, [year, netEmission]);

  // 상태 메시지 결정 로직 (넷제로 및 순배출량에 따라 변화)
  const getStatusMessage = () => {
    if (isPlaying) {
      if (netEmission < 0) return { title: "📉 탄소 네거티브 (감축)", desc: "순배출량이 마이너스입니다. 농도가 낮아지며 지구가 열을 방출합니다.", color: "text-blue-700", bg: "bg-blue-50 border-blue-200", icon: "❄️" };
      if (netEmission === 0) return { title: "⚖️ 넷제로 (Net-Zero)", desc: "배출과 흡수가 균형을 이뤘습니다. 농도와 온도가 현재 수준으로 유지됩니다.", color: "text-green-700", bg: "bg-green-50 border-green-200", icon: "⚖️" };
      if (netEmission > 0 && netEmission <= 2) return { title: "🐢 온실기체 배출 (감속)", desc: "배출량이 증가하고 있지만 적극적인 억제로 상승 속도가 늦춰집니다.", color: "text-orange-700", bg: "bg-orange-50 border-orange-200", icon: "🐢" };
      if (netEmission > 2) return { title: "🚀 온실기체 배출 (가속)", desc: "급격한 화석연료 사용으로 기후 한계선에 매우 빠르게 도달합니다.", color: "text-red-700", bg: "bg-red-50 border-red-200", icon: "🚀" };
    }
    if (Math.abs(tempAnomaly - 1.5) < 0.05) return { title: "⚠️ 1.5°C 임계점 도달", desc: "인류가 약속한 기후 마지노선에 도달했습니다. 재앙적 기후 변화가 우려됩니다.", color: "text-red-700", bg: "bg-red-100 border-red-300", icon: "🚨" };
    return { title: "대기 복사 평형 분석 중", desc: "각 화살표에 마우스를 올려 에너지의 흐름을 분석해보세요.", color: "text-slate-700", bg: "bg-slate-50 border-slate-200", icon: "🔍" };
  };

  const status = getStatusMessage();

  const arrowConfigs = [
    { id: "solar", d: "M 180 -20 L 260 160", value: solar, color: "#f97316", textPos: {x: 210, y: 60}, noArrow: true, label: "태양 복사" },
    { id: "solar_atmo", d: "M 260 160 Q 330 180 400 200", value: solarAtmo, color: "#f97316", angle: 16, headPos: {x: 400, y: 200}, textPos: {x: 340, y: 155} },
    { id: "solar_surf", d: "M 260 160 L 330 400", value: solarSurf, color: "#f97316", textPos: {x: 285, y: 290}, noArrow: true, label: "지표면 흡수" },
    { id: "solar_surf", d: "M 330 400 L 345 440", value: solarSurf, color: "#f97316", angle: 69, headPos: {x: 345, y: 440}, noText: true },
    { id: "reflect_cloud", d: "M 260 160 Q 180 190 160 90", value: 25, color: "#f59e0b", textPos: {x: 185, y: 145}, noArrow: true },
    { id: "reflect_surf", d: "M 330 400 Q 250 380 160 90", value: 5, color: "#f59e0b", textPos: {x: 230, y: 350}, noArrow: true },
    { id: "reflect", d: "M 160 90 L 130 10", value: reflectTotal, color: "#f59e0b", angle: -110, headPos: {x: 130, y: 10}, textPos: {x: 100, y: 60}, label: "지구 반사" },
    { id: "surf_rad", d: "M 500 400 L 500 250", value: R, color: "#ef4444", textPos: {x: 440, y: 330}, noArrow: true, label: "지표면 복사" },
    { id: "direct", d: "M 500 250 L 500 0", value: D, color: "#ef4444", angle: -90, headPos: {x: 500, y: 0}, textPos: {x: 555, y: 90}, label: "우주 방출(지표)" },
    { id: "atmo_abs", d: "M 500 250 Q 500 180 650 180", value: A_abs, color: "#ef4444", angle: 0, headPos: {x: 650, y: 180}, textPos: {x: 575, y: 215}, label: "대기 흡수(지표)" },
    { id: "atmo_space", d: "M 750 180 L 750 0", value: U, color: "#3b82f6", angle: -90, headPos: {x: 750, y: 0}, textPos: {x: 825, y: 90}, label: "우주 방출(대기)" },
    { id: "atmo_surf", d: "M 750 180 L 750 400", value: B, color: "#3b82f6", angle: 90, headPos: {x: 750, y: 400}, textPos: {x: 825, y: 310}, label: "지표면 흡수(대기)" }
  ];

  return (
    <div className="min-h-screen bg-slate-50 p-4 md:p-6 font-sans select-none overflow-hidden">
      
      {showStartModal && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 bg-opacity-90 backdrop-blur-md px-4">
          <div className="bg-white p-10 rounded-3xl shadow-2xl max-w-lg w-full text-center space-y-8 transform scale-110">
            <div className="text-8xl animate-pulse">🌋</div>
            <h1 className="text-4xl font-black text-slate-800 tracking-tight">기후 위기 시뮬레이션</h1>
            <p className="text-slate-600 font-semibold text-lg leading-relaxed">
              탄소 정책에 따라 달라지는<br/><span className="text-blue-600 underline decoration-blue-200">지구 복사 평형의 변화</span>를 관찰해봅시다.
            </p>
            <button
              onClick={handleStartOptimization}
              className="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-2xl transition-all text-2xl shadow-xl hover:scale-105 active:scale-95"
            >
              창 크기 최적화 및 시작하기
            </button>
          </div>
        </div>
      )}

      <div className="max-w-7xl mx-auto space-y-4">
        
        {/* 상단 컨트롤 패널 (3분할: 정책 | CO2 그래프 | 온도 그래프) */}
        <div className="bg-white p-4 rounded-3xl shadow-sm border border-slate-200 flex flex-col lg:flex-row gap-4 h-auto lg:h-[260px]">
          
          {/* 1. 정책 조작부 */}
          <div className="lg:w-[28%] space-y-3 lg:border-r border-slate-100 lg:pr-4 flex flex-col justify-between">
            <div className="flex justify-between items-center">
              <h2 className="text-lg font-black text-slate-800">이산화탄소 정책</h2>
              <div className="flex gap-1">
                <button onClick={handleReset} className="p-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-md transition-colors" title="초기화">
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
                <button onClick={() => setIsPlaying(!isPlaying)} className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-all shadow-sm ${isPlaying ? 'bg-red-50 text-red-600 border border-red-200' : 'bg-green-600 text-white'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 재생'}
                </button>
              </div>
            </div>
            
            {/* NET 컨트롤러 */}
            <div className="flex items-center justify-between bg-slate-50 border border-slate-200 rounded-2xl p-1.5 shadow-inner">
              <button onClick={() => setNetEmission(prev => Math.max(-5, prev - 1))} className="w-10 h-10 flex items-center justify-center bg-blue-100 text-blue-700 hover:bg-blue-600 hover:text-white rounded-xl font-black text-xl transition-all shadow-sm shrink-0 active:scale-90">-</button>
              <div className="flex flex-col items-center justify-center flex-1 px-2 w-full">
                <span className="text-[10px] font-bold text-slate-500 mb-1">순배출량(NET)</span>
                <div className="flex items-center w-full gap-[2px]">
                  {[-5, -4, -3, -2, -1].map(v => <div key={v} className={`h-4 flex-1 rounded-[2px] transition-all ${v >= netEmission && netEmission < 0 ? 'bg-blue-500 shadow-[0_0_5px_rgba(59,130,246,0.5)]' : 'bg-slate-200'}`} />)}
                  <div className={`h-5 w-1.5 rounded-full mx-0.5 transition-all ${netEmission === 0 ? 'bg-green-500 scale-110 shadow-[0_0_5px_rgba(34,197,94,0.5)]' : 'bg-slate-300'}`} />
                  {[1, 2, 3, 4, 5].map(v => <div key={v} className={`h-4 flex-1 rounded-[2px] transition-all ${v <= netEmission && netEmission > 0 ? 'bg-red-500 shadow-[0_0_5px_rgba(239,68,68,0.5)]' : 'bg-slate-200'}`} />)}
                </div>
                <div className="text-[10px] font-black mt-1 h-3 flex items-center justify-center">
                  {netEmission > 0 && <span className="text-red-500">+{netEmission} (증가)</span>}
                  {netEmission < 0 && <span className="text-blue-500">{netEmission} (감소)</span>}
                  {netEmission === 0 && <span className="text-green-600">0 (넷제로)</span>}
                </div>
              </div>
              <button onClick={() => setNetEmission(prev => Math.min(5, prev + 1))} className="w-10 h-10 flex items-center justify-center bg-red-100 text-red-700 hover:bg-red-600 hover:text-white rounded-xl font-black text-xl transition-all shadow-sm shrink-0 active:scale-90">+</button>
            </div>

            {/* 상태 메시지 카드 (기존 분석 박스의 알림 내용 편입) */}
            <div className={`p-2.5 rounded-xl flex items-center gap-3 border transition-all duration-500 ${status.bg}`}>
              <div className="text-2xl">{status.icon}</div>
              <div className="flex-1 overflow-hidden">
                <h3 className={`text-[11px] font-black truncate ${status.color}`}>{status.title}</h3>
                <p className="text-[9px] mt-0.5 text-slate-600 font-semibold leading-tight line-clamp-2">{status.desc}</p>
              </div>
            </div>
          </div>

          {/* 2. 이산화탄소 그래프 */}
          <div className="lg:w-[36%] flex flex-col pt-1 lg:border-r border-slate-100 lg:pr-4">
            <div className="flex justify-between items-baseline mb-1">
              <h3 className="text-sm font-black text-slate-700">이산화탄소 농도 추이</h3>
              <span className="text-lg font-black text-slate-800 tracking-tighter">{Math.round(ppm)} <span className="text-xs font-medium text-slate-400">ppm</span></span>
            </div>
            <div className="flex-1 min-h-[160px] w-full">
              <ResponsiveContainer width="100%" height="100%">
                <LineChart data={chartData} margin={{ top: 15, right: 10, left: -25, bottom: 0 }}>
                  <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                  <XAxis dataKey="year" type="number" domain={[1850, 2100]} ticks={[1850, 1900, 1950, 2000, 2050, 2100]} tick={{fontSize: 10, fill: '#64748b', fontWeight: 600}} stroke="#cbd5e1" tickFormatter={(v) => `${v}년`} />
                  <YAxis domain={[280, 'auto']} tick={{fontSize: 10, fill: '#64748b', fontWeight: 600}} stroke="#cbd5e1" />
                  <Tooltip 
                    contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)', fontSize: '11px', fontWeight: 'bold' }} 
                    labelFormatter={(l) => `${l}년`}
                    formatter={(value, name) => [value.toFixed(1), name]}
                  />
                  <ReferenceLine y={455} stroke="#ef4444" strokeDasharray="3 3" label={{ position: 'insideTopLeft', value: '1.5℃ 한계', fill: '#ef4444', fontSize: 10, fontWeight: 'bold' }} />
                  <Line type="monotone" dataKey="ppmHistory" name="기록" stroke="#3b82f6" strokeWidth={3} dot={false} isAnimationActive={false} />
                  <Line type="monotone" dataKey="ppmProj" name="미래 예측" stroke="#3b82f6" strokeWidth={2.5} strokeDasharray="5 5" dot={false} isAnimationActive={false} opacity={0.6} />
                </LineChart>
              </ResponsiveContainer>
            </div>
          </div>

          {/* 3. 온도 그래프 */}
          <div className="lg:w-[36%] flex flex-col pt-1">
            <div className="flex justify-between items-baseline mb-1">
              <h3 className="text-sm font-black text-slate-700">지표면 평균 온도 상승</h3>
              <span className={`text-lg font-black tracking-tighter ${tempAnomaly > 1.5 ? 'text-red-500' : 'text-orange-500'}`}>
                +{tempAnomaly.toFixed(1)} <span className="text-xs font-medium text-slate-400">℃</span>
              </span>
            </div>
            <div className="flex-1 min-h-[160px] w-full">
              <ResponsiveContainer width="100%" height="100%">
                <LineChart data={chartData} margin={{ top: 15, right: 10, left: -25, bottom: 0 }}>
                  <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                  <XAxis dataKey="year" type="number" domain={[1850, 2100]} ticks={[1850, 1900, 1950, 2000, 2050, 2100]} tick={{fontSize: 10, fill: '#64748b', fontWeight: 600}} stroke="#cbd5e1" tickFormatter={(v) => `${v}년`} />
                  <YAxis domain={[0, 'auto']} tick={{fontSize: 10, fill: '#64748b', fontWeight: 600}} stroke="#cbd5e1" />
                  <Tooltip 
                    contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)', fontSize: '11px', fontWeight: 'bold' }}
                    labelFormatter={(l) => `${l}년`}
                    formatter={(value, name) => [`+${value.toFixed(2)}℃`, name]}
                  />
                  <ReferenceLine y={1.5} stroke="#ef4444" strokeDasharray="3 3" label={{ position: 'insideTopLeft', value: '1.5℃ 한계', fill: '#ef4444', fontSize: 10, fontWeight: 'bold' }} />
                  <Line type="monotone" dataKey="tempHistory" name="기록" stroke="#f97316" strokeWidth={3} dot={false} isAnimationActive={false} />
                  <Line type="monotone" dataKey="tempProj" name="미래 예측" stroke="#f97316" strokeWidth={2.5} strokeDasharray="5 5" dot={false} isAnimationActive={false} opacity={0.6} />
                </LineChart>
              </ResponsiveContainer>
            </div>
          </div>

        </div>

        {/* 메인 시뮬레이션 영역 */}
        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
          <div className="lg:col-span-3 relative w-full h-[540px] bg-white rounded-3xl shadow-md border border-slate-200 overflow-hidden">
            <svg viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet" className="w-full h-full">
              <rect x="0" y="0" width="1000" height="130" fill="#0f172a" />
              <rect x="0" y="130" width="1000" height="270" fill="url(#sky)" />
              <path d="M 0 400 Q 250 380 500 400 T 1000 390 L 1000 500 L 0 500 Z" fill={groundColor} className="transition-colors duration-1000" />
              <defs>
                <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#38bdf8" />
                  <stop offset="100%" stopColor="#e0f2fe" />
                </linearGradient>
              </defs>

              <path d="M 370 200 Q 380 160 420 180 Q 440 160 460 180 Q 490 200 460 220 L 390 220 Q 350 220 370 200" fill="white" opacity="0.95" />
              <path d="M 600 180 Q 620 120 690 160 Q 730 110 800 150 Q 840 130 870 180 Q 890 220 840 230 L 620 230 Q 570 230 600 180" fill="white" opacity="0.95" />

              <g id="arrows-layer">
                {arrowConfigs.map((config, index) => (
                  <ArrowPath key={`arrow-${index}`} {...config} hideText={true} hoveredId={hoveredId} setHoveredId={setHoveredId} />
                ))}
              </g>

              <g className="pointer-events-none">
                <rect x="370" y="188" width="94" height="24" fill="rgba(255,255,255,0.95)" rx="6" className="shadow-sm" />
                <text x="417" y="200" textAnchor="middle" dominantBaseline="middle" fontSize="12" fontWeight="900" fill="#0284c7">대기/구름 흡수</text>
                <rect x="705" y="183" width="60" height="24" fill="rgba(255,255,255,0.95)" rx="6" className="shadow-sm" />
                <text x="735" y="195" textAnchor="middle" dominantBaseline="middle" fontSize="13" fontWeight="900" fill="#0284c7">대기</text>
                <text x="960" y="30" fill="rgba(255,255,255,0.7)" textAnchor="end" className="text-xl font-bold">우주 공간</text>
                <text x="960" y="460" fill="rgba(0,0,0,0.5)" textAnchor="end" className="text-xl font-bold">지표면</text>
              </g>

              <g id="texts-layer">
                {arrowConfigs.map((config, index) => (
                  <ArrowPath key={`text-${index}`} {...config} hideArrow={true} hoveredId={hoveredId} setHoveredId={setHoveredId} />
                ))}
              </g>
            </svg>
            
            <style dangerouslySetInnerHTML={{__html: `
              .custom-slider::-webkit-slider-thumb {
                -webkit-appearance: none; appearance: none;
                width: 22px; height: 22px; border-radius: 50%;
                background: white; border: 4px solid #3b82f6;
                cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
              }
              .custom-slider::-moz-range-thumb {
                width: 22px; height: 22px; border-radius: 50%;
                background: white; border: 4px solid #3b82f6;
                cursor: pointer;
              }
            `}} />
          </div>

          <div className="lg:col-span-1 flex flex-col bg-slate-900 rounded-3xl shadow-2xl text-white overflow-hidden border border-slate-800">
            <div className="bg-slate-800 p-4 border-b border-slate-700">
              <h3 className="font-black text-lg flex items-center gap-2">
                <span className="text-blue-400">💡</span> 에너지 분석 도구
              </h3>
            </div>
            <div className="p-6 flex-1 relative overflow-y-auto">
              {hoveredId ? (
                <div className="animate-in fade-in slide-in-from-bottom-2 duration-300">
                  <div className="inline-block px-2 py-1 bg-blue-900/50 rounded text-[10px] font-bold text-blue-300 mb-3 border border-blue-800">
                    {INFO_DATA[hoveredId].type}
                  </div>
                  <h4 className="text-2xl font-black text-white mb-4 leading-tight">
                    {INFO_DATA[hoveredId].name}
                  </h4>
                  <p className="text-slate-300 leading-relaxed text-sm font-medium">
                    {INFO_DATA[hoveredId].desc}
                  </p>
                </div>
              ) : (
                <div className="h-full flex flex-col items-center justify-center text-slate-500 space-y-4 text-center">
                  <div className="text-6xl opacity-20">📊</div>
                  <p className="font-bold text-sm leading-relaxed px-4">
                    화면의 화살표 글자나<br/>박스에 마우스를 올리면<br/>상세 분석이 시작됩니다.
                  </p>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

        // 작성된 App 컴포넌트를 화면(root)에 그려줍니다.
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
